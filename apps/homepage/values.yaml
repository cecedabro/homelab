image:
  repository: ghcr.io/gethomepage/homepage

enableRbac: false

serviceAccount:
  name: ""
  create: false

service:
  main:
    ports:
      http:
        port: 3000
config:
  bookmarks: []

  services:
    - Cluster Management:
        - Portainer:
            href: https://192.168.50.11:30779
            description: Container & pod management
            icon: portainer
        - Longhorn:
            href: http://192.168.50.103
            description: Distributed storage
            icon: longhorn
        - Grafana:
            href: http://192.168.50.102
            description: Monitoring dashboards
            icon: grafana
    - Gaming:
        - Minecraft Bedrock:
            href: https://192.168.50.11:30779/#!/1/kubernetes/helm/minecraft/minecraft-bedrock?tab=resources
            description: "Connect via 100.113.240.94:30000"
            icon: minecraft
    - Media:
        - Jellyfin:
            href: http://192.168.50.107:8096
            description: Media streaming
            icon: jellyfin
        - qBittorrent:
            href: http://192.168.50.104:8080
            description: Download client
            icon: qbittorrent
        - Prowlarr:
            href: http://192.168.50.105:9696
            description: Indexer manager
            icon: prowlarr
        - Radarr:
            href: http://192.168.50.106:7878
            description: Movie automation
            icon: radarr

  widgets:
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
    - search:
        provider: duckduckgo
        target: _blank

  settingsString: |
    title: Cedric's Homelab
    headerStyle: boxed

kubernetes:
  mode: disable

env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    value: "192.168.50.101:3000"